name: Generate Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore novai.keystore \
            -alias novAI \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass novaproject2026 \
            -keypass novaproject2026 \
            -dname "CN=NovAI, OU=NovProject, O=NovProject, L=Unknown, ST=Unknown, C=RU"
          
          echo "=== KEYSTORE BASE64 START ==="
          base64 -w 0 novai.keystore
          echo ""
          echo "=== KEYSTORE BASE64 END ==="
          
          echo "## Keystore generated successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Copy the base64 string below and add it as a GitHub Secret named **KEYSTORE_BASE64**:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          base64 -w 0 novai.keystore >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Also add these secrets:" >> $GITHUB_STEP_SUMMARY
          echo "- **KEYSTORE_PASSWORD** = novaproject2026" >> $GITHUB_STEP_SUMMARY
          echo "- **KEY_ALIAS** = novAI" >> $GITHUB_STEP_SUMMARY
          echo "- **KEY_PASSWORD** = novaproject2026" >> $GITHUB_STEP_SUMMARY
